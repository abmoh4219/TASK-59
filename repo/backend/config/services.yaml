parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Controller\:
        resource: '../src/Controller/'
        tags: ['controller.service_arguments']

    # Encryption service — key from env var
    App\Service\EncryptionService:
        arguments:
            $appEncryptionKey: '%env(APP_ENCRYPTION_KEY)%'

    # API signature authenticator — signing key from env var
    App\Security\ApiSignatureAuthenticator:
        arguments:
            $appSigningKey: '%env(APP_SIGNING_KEY)%'
