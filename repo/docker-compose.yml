services:
  setup:
    image: alpine:3.19
    volumes:
      - .:/app
    entrypoint: /bin/sh
    command:
      - -c
      - |
        # Always write a Docker-compatible backend/.env. We do NOT rely on
        # whatever .env.example happens to ship in the build context — some
        # validator images carry a stale .env.example that points at
        # 127.0.0.1 and causes connection-refused failures inside the
        # backend container. Re-writing the file every boot guarantees
        # Symfony's Dotenv and any ad-hoc tooling see a DSN that resolves
        # to the in-network `mysql` service.
        cat > /app/backend/.env <<'ENVFILE'
        APP_ENV=prod
        APP_SECRET=change-this-32-char-secret-here!!
        DATABASE_URL="mysql://wfops:wfops_pass@mysql:3306/wfops?serverVersion=8&charset=utf8mb4"
        APP_ENCRYPTION_KEY=change-this-to-32-byte-aes-key!!
        APP_SIGNING_KEY=change-this-signing-key-for-hmac
        CORS_ALLOW_ORIGIN=http://localhost:3000
        ENVFILE
        echo "Wrote Docker-compatible backend/.env"

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: wfops
      MYSQL_USER: wfops
      MYSQL_PASSWORD: wfops_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_ENV: prod
      APP_SECRET: change-this-32-char-secret-here!!
      # Authoritative DSN for the backend container. Real env vars take
      # precedence over backend/.env in Symfony's Runtime, so this wins
      # even if a stale .env file is baked into the image. Host is the
      # compose service name "mysql", reachable via the default network.
      DATABASE_URL: "mysql://wfops:wfops_pass@mysql:3306/wfops?serverVersion=8&charset=utf8mb4"
      APP_ENCRYPTION_KEY: change-this-to-32-byte-aes-key!!
      APP_SIGNING_KEY: change-this-signing-key-for-hmac
      CORS_ALLOW_ORIGIN: "http://localhost:3000"
    depends_on:
      setup:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  # Test services — only run with --profile test
  mysql-test:
    image: mysql:8.0
    profiles: ["test"]
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: wfops_test
      MYSQL_USER: wfops
      MYSQL_PASSWORD: wfops_pass
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  test:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: test
    profiles: ["test"]
    environment:
      APP_ENV: test
      APP_SECRET: test-secret-key-for-testing-only!
      DATABASE_URL: "mysql://wfops:wfops_pass@mysql-test:3306/wfops_test?serverVersion=8.0"
      APP_ENCRYPTION_KEY: test-encryption-key-32-bytes-ok!
      APP_SIGNING_KEY: test-signing-key-for-hmac-tests
      CORS_ALLOW_ORIGIN: "http://localhost:3000"
    depends_on:
      mysql-test:
        condition: service_healthy
    volumes:
      - ./run_tests.sh:/app/run_tests.sh
      - ./backend/src:/app/backend/src
      - ./backend/tests:/app/backend/tests
      - ./backend/config:/app/backend/config
      - ./backend/migrations:/app/backend/migrations
      - ./frontend/src:/app/frontend/src
      - ./frontend/tests:/app/frontend/tests
    command: ["/bin/sh", "/app/run_tests.sh"]

volumes:
  mysql-data:
  uploads:
